version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: jager
      POSTGRES_USER: jager
      POSTGRES_PASSWORD: jager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://jager:jager@db:5432/jager
      - OLLAMA_HOST=http://host.docker.internal:11434
    depends_on:
      - db
    volumes:
      - ./src/backend:/app
      - ./src/frontend:/frontend
      - ./prompts:/prompts
      - ./data/reddit:/app/data/reddit

volumes:
  pgdata:
