version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: jager
      POSTGRES_USER: jager
      POSTGRES_PASSWORD: jager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./legacy/init-user-db.sh:/docker-entrypoint-initdb.d/init-user-db.sh

  n8n:
    build:
      context: ./src/n8n
      dockerfile: Dockerfile
    restart: always
    expose:
      - "5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=jager
      - DB_POSTGRESDB_PASSWORD=jager
    depends_on:
      - db

  caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - n8n

volumes:
  pgdata:
  caddy_data:
  caddy_config:
