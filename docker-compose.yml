version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: jager
      POSTGRES_USER: jager
      POSTGRES_PASSWORD: jager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./legacy/init-user-db.sh:/docker-entrypoint-initdb.d/init-user-db.sh

  n8n:
    build:
      context: ./src/n8n
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=jager
      - DB_POSTGRESDB_PASSWORD=jager
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
    depends_on:
      - db

volumes:
  pgdata:
