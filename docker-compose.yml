version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg15
    restart: always
    environment:
      POSTGRES_DB: jager
      POSTGRES_USER: jager
      POSTGRES_PASSWORD: jager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/db/init-user-db.sh:/docker-entrypoint-initdb.d/init-user-db.sh

  n8n:
    build:
      context: ./
      dockerfile: src/n8n/Dockerfile
    restart: always
    expose:
      - "5678"
    environment:
      - N8N_ENV=${N8N_ENV:-production}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=jager
      - DB_POSTGRESDB_PASSWORD=jager
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - SLACK_OAUTH_TOKEN=${SLACK_OAUTH_TOKEN}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      - SLACK_GIUSY_OAUTH_TOKEN=${SLACK_GIUSY_OAUTH_TOKEN}
      - SLACK_GIUSY_APP_TOKEN=${SLACK_GIUSY_APP_TOKEN}
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      - LINKEDIN_MEMBER_DATA_PORTABILITY_API_TOKEN=${LINKEDIN_MEMBER_DATA_PORTABILITY_API_TOKEN}
      - LINKEDIN_SHARE_ON_APP_CLIENT_ID=${LINKEDIN_SHARE_ON_APP_CLIENT_ID}
      - LINKEDIN_SHARE_ON_APP_CLIENT_SECRET=${LINKEDIN_SHARE_ON_APP_CLIENT_PRIMARY_CLIENT_SECRET}
      - NOTION_API_KEY=${NOTION_API_KEY}
      - NOTION_SUBSTACK_POSTS_GENERATION_API_KEY=${NOTION_SUBSTACK_POSTS_GENERATION_API_KEY}
      - BUFFER_API_KEY=${BUFFER_API_KEY}
      - HUGGING_FACE_TOKEN=${HUGGING_FACE_TOKEN}
      - ML_SERVICE_URL=${ML_SERVICE_URL:-http://ml:8000}
      - WEBHOOK_URL=${WEBHOOK_URL:-https://jager.n8n.com/}
      - GENERIC_TIMEZONE=Europe/Berlin
      - N8N_PROXY_HOPS=1
      - MOTHERDUCK_TOKEN=${MOTHERDUCK_TOKEN}
      - MOTHERDUCK_DATABASE=${MOTHERDUCK_DATABASE:-staging}
      - MOTHERDUCK_HOST=${MOTHERDUCK_HOST:-pg.us-east-1-aws.motherduck.com}
      - MOTHERDUCK_USER=${MOTHERDUCK_USER:-postgres}
      - POSTGRES_OLAP_URL=postgresql://jager:jager@db:5432/jager_olap
    depends_on:
      - db
    volumes:
      - n8n_data:/home/node/.n8n
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5678/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 120s

  ml:
    build:
      context: ./
      dockerfile: src/ml/Dockerfile
    restart: always
    environment:
      - DATABASE_URL=postgresql://jager:jager@db:5432/jager
    depends_on:
      - db

  caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      n8n:
        condition: service_healthy

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - caddy

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  n8n_data:
