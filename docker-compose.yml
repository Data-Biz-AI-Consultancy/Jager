version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: jager
      POSTGRES_USER: jager
      POSTGRES_PASSWORD: jager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./legacy/init-user-db.sh:/docker-entrypoint-initdb.d/init-user-db.sh

  n8n:
    build:
      context: ./src/n8n
      dockerfile: Dockerfile
    restart: always
    expose:
      - "5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=jager
      - DB_POSTGRESDB_PASSWORD=jager
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - SLACK_OAUTH_TOKEN=${SLACK_OAUTH_TOKEN}
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
    depends_on:
      - db
    volumes:
      - n8n_data:/home/node/.n8n

  caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - n8n

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  n8n_data:
