name: 'jager_dbt'
version: '1.0.0'
config-version: 2

profile: 'jager_dbt'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
clean-targets:
  - "target"
  - "dbt_packages"

models:
  jager_dbt:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
    t_jager:
      +materialized: table
      +schema: t_jager
    t_reporting:
      +materialized: table
      +schema: t_reporting

