name: CI Test Suite

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Dockerfile Context Unit Test
        run: node tests/test-dockerfile.js

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Custom N8N Docker Build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/n8n/Dockerfile
          push: false
          tags: n8n-custom:latest
