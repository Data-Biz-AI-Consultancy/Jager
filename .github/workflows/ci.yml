name: CI Test Suite

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Dockerfile Context Unit Test
        run: node tests/test-dockerfile.js

      - name: Validate Docker Compose configuration
        run: |
          touch .env
          echo "SLACK_OAUTH_TOKEN=dummy" >> .env
          echo "SLACK_APP_TOKEN=dummy" >> .env
          echo "OLLAMA_API_KEY=dummy" >> .env
          echo "LINKEDIN_MEMBER_DATA_PORTABILITY_API_TOKEN=dummy" >> .env

          docker compose config --quiet


  test-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run Python Backend Tests
        run: uv run --with pytest --with scikit-learn --with pandas --with fastapi --with httpx --with numpy --with sqlalchemy --with dlt pytest tests/

  dbt-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt-duckdb
        run: pip install dbt-duckdb

      - name: dbt compile (CI target - local DuckDB)
        working-directory: src/data_pipelines/dbt
        run: dbt compile --target ci --profiles-dir .

