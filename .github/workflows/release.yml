name: Semantic Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate workflow JSON
        run: |
          if jq empty src/n8n/workflow.json; then
            echo "workflow.json is valid JSON"
          else
            echo "workflow.json is NOT valid JSON"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build custom N8N Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./src/n8n
          file: ./src/n8n/Dockerfile
          push: false
          tags: n8n-custom:latest

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

