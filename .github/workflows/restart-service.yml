name: Restart Service (Production)

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to restart'
        required: true
        default: 'caddy'
        type: choice
        options:
          - caddy
          - n8n
          - ml
          - db

jobs:
  restart:
    runs-on: ubuntu-latest

    steps:
      - name: Restart ${{ inputs.service }} on production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          script: |
            cd ${{ secrets.PROD_PROJECT_DIR }}
            docker compose restart ${{ inputs.service }}
            echo "--- Status after restart ---"
            docker compose ps ${{ inputs.service }}
